<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lettori-Scrittori: Simulazione Concorrenza</title>
    <!-- Tailwind CSS per lo styling rapido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel per far girare il codice JSX direttamente nel browser -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Fira+Code&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'Fira Code', monospace; }
        .highlight-reader { background-color: rgba(59, 130, 246, 0.2); color: white; border-radius: 4px; font-weight: bold; }
        .highlight-writer { background-color: rgba(239, 68, 68, 0.2); color: white; border-radius: 4px; font-weight: bold; }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .active-ring { animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Icone SVG integrate per evitare dipendenze esterne
        const Icons = {
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Reader: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Writer: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>,
            Play: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Pause: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Reset: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>
        };

        const App = () => {
            const [threads, setThreads] = useState([]);
            const [readCount, setReadCount] = useState(0);
            const [isWriting, setIsWriting] = useState(false);
            const [isRunning, setIsRunning] = useState(false);
            const nextId = useRef(1);

            // Aggiungi un nuovo thread (Lettore o Scrittore)
            const addThread = (type) => {
                const id = nextId.current++;
                setThreads(prev => [...prev, {
                    id,
                    type,
                    state: 'IDLE', // IDLE, WAITING, WORKING
                    progress: 0
                }]);
            };

            // Ciclo della simulazione
            useEffect(() => {
                if (!isRunning) return;

                const tick = setInterval(() => {
                    setThreads(prev => {
                        const newThreads = [...prev];
                        
                        // Determina chi sta lavorando attualmente
                        const currentActiveWriters = newThreads.filter(t => t.type === 'WRITER' && t.state === 'WORKING').length;
                        const currentActiveReaders = newThreads.filter(t => t.type === 'READER' && t.state === 'WORKING').length;

                        return newThreads.map(t => {
                            // 1. I thread in IDLE decidono casualmente di voler accedere alla risorsa
                            if (t.state === 'IDLE' && Math.random() > 0.98) {
                                return { ...t, state: 'WAITING' };
                            }

                            // 2. I thread in WAITING provano ad entrare (Logica Sincronizzazione)
                            if (t.state === 'WAITING') {
                                if (t.type === 'READER') {
                                    // Un lettore entra se nessuno sta scrivendo
                                    if (currentActiveWriters === 0) return { ...t, state: 'WORKING', progress: 0 };
                                } else {
                                    // Uno scrittore entra se la risorsa è totalmente vuota (no lettori, no scrittori)
                                    if (currentActiveReaders === 0 && currentActiveWriters === 0) {
                                        return { ...t, state: 'WORKING', progress: 0 };
                                    }
                                }
                            }

                            // 3. I thread in WORKING avanzano nel loro compito
                            if (t.state === 'WORKING') {
                                if (t.progress >= 100) return { ...t, state: 'IDLE', progress: 0 };
                                return { ...t, progress: t.progress + (t.type === 'READER' ? 4 : 2) };
                            }

                            return t;
                        });
                    });
                }, 100);

                return () => clearInterval(tick);
            }, [isRunning]);

            // Aggiorna lo stato globale dei semafori basandosi sui thread attivi
            useEffect(() => {
                const activeReaders = threads.filter(t => t.type === 'READER' && t.state === 'WORKING').length;
                const activeWriter = threads.some(t => t.type === 'WRITER' && t.state === 'WORKING');
                setReadCount(activeReaders);
                setIsWriting(activeWriter);
            }, [threads]);

            const ThreadCard = ({ thread }) => {
                const isR = thread.type === 'READER';
                const baseClass = "flex flex-col items-center p-2 rounded-xl border-2 transition-all duration-300 ";
                const stateClass = thread.state === 'WORKING' 
                    ? (isR ? "bg-blue-100 border-blue-400 scale-105 shadow-md" : "bg-red-100 border-red-400 scale-110 shadow-lg active-ring")
                    : thread.state === 'WAITING' ? "bg-amber-50 border-amber-200 opacity-90 animate-pulse" : "bg-white border-slate-100 opacity-50";

                return (
                    <div className={baseClass + stateClass}>
                        <div className={isR ? "text-blue-600" : "text-red-600"}>
                            {isR ? <Icons.Reader /> : <Icons.Writer />}
                        </div>
                        <span className="text-[10px] font-bold mt-1 uppercase">{isR ? 'Lett.' : 'Scritt.'} {thread.id}</span>
                        {thread.state === 'WORKING' && (
                            <div className="w-full h-1 bg-slate-200 mt-2 rounded-full overflow-hidden">
                                <div className={`h-full ${isR ? 'bg-blue-500' : 'bg-red-500'}`} style={{width: `${thread.progress}%`}} />
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    {/* Header con Controlli */}
                    <div className="flex flex-col md:flex-row items-center justify-between mb-8 gap-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div>
                            <h1 className="text-2xl font-black text-slate-800 flex items-center gap-2">
                                <div className="p-2 bg-indigo-600 rounded-lg text-white"><Icons.Users /></div>
                                Problema Lettori-Scrittori
                            </h1>
                            <p className="text-slate-500 text-sm">Visualizzazione del monitor di sincronizzazione</p>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsRunning(!isRunning)} className={`p-4 rounded-2xl transition-all ${isRunning ? 'bg-amber-100 text-amber-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                {isRunning ? <Icons.Pause /> : <Icons.Play />}
                            </button>
                            <button onClick={() => {setThreads([]); nextId.current=1;}} className="p-4 rounded-2xl bg-slate-100 text-slate-600 hover:bg-slate-200">
                                <Icons.Reset />
                            </button>
                            <div className="h-10 w-px bg-slate-200 mx-2" />
                            <button onClick={() => addThread('READER')} className="px-6 py-3 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                                + Lettore
                            </button>
                            <button onClick={() => addThread('WRITER')} className="px-6 py-3 bg-red-600 text-white font-bold rounded-2xl shadow-lg shadow-red-200 hover:bg-red-700 active:scale-95 transition-all">
                                + Scrittore
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Area di Simulazione Visiva */}
                        <div className="lg:col-span-2 space-y-6">
                            {/* Pannelli di Stato */}
                            <div className="grid grid-cols-3 gap-4">
                                <div className="bg-white p-4 rounded-2xl border border-slate-200 text-center shadow-sm">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Contatore Lettori</p>
                                    <p className="text-3xl font-black text-blue-600">{readCount}</p>
                                </div>
                                <div className="bg-white p-4 rounded-2xl border border-slate-200 text-center shadow-sm">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Semaforo Scrittura</p>
                                    <p className={`text-xl font-black ${isWriting ? 'text-red-600' : 'text-emerald-500'}`}>
                                        {isWriting ? 'OCCUPATO' : 'LIBERO'}
                                    </p>
                                </div>
                                <div className="bg-white p-4 rounded-2xl border border-slate-200 text-center shadow-sm">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Mutua Esclusione</p>
                                    <p className={`text-xl font-black ${readCount > 0 ? 'text-blue-500' : 'text-slate-300'}`}>
                                        {readCount > 0 ? 'ATTIVA' : 'IDLE'}
                                    </p>
                                </div>
                            </div>

                            {/* Campo di Battaglia (Threads) */}
                            <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl p-8 min-h-[500px] grid grid-cols-3 gap-6 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-red-500 opacity-30" />
                                
                                {/* Colonna Waiting */}
                                <div className="flex flex-col items-center">
                                    <h3 className="text-[11px] font-black text-slate-400 mb-6 uppercase tracking-[0.2em]">In Attesa</h3>
                                    <div className="flex flex-wrap justify-center gap-2 content-start">
                                        {threads.filter(t => t.state === 'WAITING').map(t => <ThreadCard key={t.id} thread={t} />)}
                                    </div>
                                </div>

                                {/* Sezione Critica */}
                                <div className="flex flex-col items-center bg-slate-50/50 rounded-3xl border-2 border-dashed border-slate-200 p-4">
                                    <h3 className="text-[11px] font-black text-slate-400 mb-6 uppercase tracking-[0.2em]">Risorsa (Database)</h3>
                                    <div className="flex-1 flex flex-col items-center justify-center w-full">
                                        {isWriting ? (
                                            <div className="flex flex-col items-center animate-pulse">
                                                <div className="p-6 bg-red-500 rounded-full text-white shadow-xl mb-4"><Icons.Writer /></div>
                                                <p className="text-red-600 font-black text-xs uppercase tracking-widest">Scrittura in corso</p>
                                                <div className="mt-4">{threads.filter(t => t.type === 'WRITER' && t.state === 'WORKING').map(t => <ThreadCard key={t.id} thread={t} />)}</div>
                                            </div>
                                        ) : readCount > 0 ? (
                                            <div className="flex flex-col items-center w-full">
                                                <div className="p-6 bg-blue-500 rounded-full text-white shadow-xl mb-6"><Icons.Reader /></div>
                                                <div className="flex flex-wrap justify-center gap-2">
                                                    {threads.filter(t => t.type === 'READER' && t.state === 'WORKING').map(t => <ThreadCard key={t.id} thread={t} />)}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="opacity-10 text-slate-400 grayscale flex flex-col items-center">
                                                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                                                <p className="font-bold mt-4">Risorsa Libera</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Colonna Idle */}
                                <div className="flex flex-col items-center">
                                    <h3 className="text-[11px] font-black text-slate-400 mb-6 uppercase tracking-[0.2em]">Fuori / Altro</h3>
                                    <div className="flex flex-wrap justify-center gap-2 content-start">
                                        {threads.filter(t => t.state === 'IDLE').map(t => <ThreadCard key={t.id} thread={t} />)}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Colonna Codice e Spiegazione */}
                        <div className="flex flex-col gap-6">
                            <div className="bg-slate-900 text-slate-400 p-6 rounded-[2rem] shadow-2xl border border-slate-800 font-mono text-[11px] overflow-hidden">
                                <div className="flex items-center gap-2 mb-6 border-b border-slate-800 pb-3">
                                    <div className="w-3 h-3 rounded-full bg-red-500" />
                                    <div className="w-3 h-3 rounded-full bg-amber-500" />
                                    <div className="w-3 h-3 rounded-full bg-emerald-500" />
                                    <span className="ml-2 text-slate-500 font-bold uppercase tracking-widest text-[9px]">Sincronizzazione Java</span>
                                </div>
                                
                                <div className="space-y-1">
                                    <p className="text-blue-400 font-bold">// METODO READ()</p>
                                    <p className="pl-2">mutex.acquire();</p>
                                    <p className="pl-2">readCount++;</p>
                                    <p className={`pl-2 transition-all ${readCount > 0 && !isWriting ? 'highlight-reader' : ''}`}>
                                        if (readCount == 1) write.acquire();
                                    </p>
                                    <p className="pl-2">mutex.release();</p>
                                    <p className="text-slate-600 pl-4 py-1 italic">// SEZIONE CRITICA LETTURA</p>
                                    <p className="pl-2">mutex.acquire();</p>
                                    <p className="pl-2">readCount--;</p>
                                    <p className="pl-2">if (readCount == 0) write.release();</p>
                                    <p className="pl-2">mutex.release();</p>
                                    
                                    <div className="h-6" />
                                    
                                    <p className="text-red-400 font-bold">// METODO WRITE()</p>
                                    <p className={`pl-2 transition-all ${isWriting ? 'highlight-writer' : ''}`}>
                                        write.acquire();
                                    </p>
                                    <p className="text-slate-600 pl-4 py-1 italic">// SEZIONE CRITICA SCRITTURA</p>
                                    <p className="pl-2">write.release();</p>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex-1">
                                <h4 className="text-sm font-black text-slate-800 mb-4 uppercase tracking-widest">Logica di Priorità</h4>
                                <div className="space-y-4 text-xs text-slate-600 leading-relaxed">
                                    <p>
                                        In questa implementazione (<strong>Priorità ai Lettori</strong>), gli scrittori possono entrare solo quando la risorsa è 
                                        completamente libera.
                                    </p>
                                    <div className="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                        <p className="text-blue-800 font-bold mb-1">Cosa succede:</p>
                                        Se un lettore è già dentro, il semaforo <code>write</code> è rosso per gli scrittori, ma altri lettori possono continuare ad aggiungersi liberamente.
                                    </div>
                                    <div className="p-4 bg-red-50 rounded-2xl border border-red-100">
                                        <p className="text-red-800 font-bold mb-1">Il rischio (Starvation):</p>
                                        Se c'è un flusso continuo di lettori, lo scrittore potrebbe rimanere in attesa per un tempo indefinito (<strong>fame dello scrittore</strong>).
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
