<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reazione a Catena - Simulatore</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #670324, #120136, #03001e);
            --blue-bubble: linear-gradient(to bottom, #0093e9, #80d0c7);
            --blue-dark: #005585;
            --orange-bubble: linear-gradient(to bottom, #ff9100, #ff5500);
            --gray-node: #1f2438;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Rounded MT Bold', 'Segoe UI', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Schermata di Configurazione */
        #setup-screen {
            background: rgba(18, 1, 54, 0.85);
            border: 3px solid #ff9100;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: #fff;
            text-shadow: 0 0 10px #ff9100;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #0093e9;
        }

        input[type="number"], input[type="file"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #251b45;
            color: #fff;
            font-size: 1rem;
        }

        button {
            cursor: pointer;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--orange-bubble);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 85, 0, 0.4);
            width: 100%;
            margin-top: 15px;
        }

        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(255, 85, 0, 0.6);
        }

        /* Interfaccia di Gioco Principale */
        #game-screen {
            display: none;
            width: 95%;
            max-width: 1200px;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        /* Pannello Sinistro: Scoreboard e Montepremi */
        .left-panel, .right-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .prize-capsule {
            background: var(--orange-bubble);
            padding: 15px;
            border-radius: 40px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.6), 0 5px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .team-score-card {
            background: #1a1436;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #0093e9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-score-card.active-turn {
            border-left: 5px solid #ff9100;
            background: #311c52;
            animation: pulse 1.5s infinite;
        }

        /* Centro: Display Catena */
        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chain-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bubble {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .bubble-anchor {
            background: linear-gradient(to right, #0072ff, #00c6ff);
            border: 2px solid #ffffff40;
        }

        .bubble-target {
            background: var(--orange-bubble);
            border: 2px solid #ffffff60;
            color: #fff;
        }

        /* Lista degli ancoraggi successivi sotto */
        .upcoming-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
            opacity: 0.85;
        }

        .upcoming-node {
            width: 100%;
            padding: 10px;
            background: rgba(31, 36, 56, 0.9);
            border: 1px solid #0093e9;
            border-radius: 8px;
            text-align: center;
            font-size: 1.1rem;
            color: #00c6ff;
            font-weight: bold;
            letter-spacing: 1px;
            transform: scale(0.98);
            transition: all 0.5s ease;
        }

        /* Animazioni della Catena */
        .slide-out-top {
            transform: translateY(-50px) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        /* Pannello di Controllo Host/Giocatori */
        .controls-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
            width: 100%;
        }

        .input-guess {
            padding: 15px;
            font-size: 1.3rem;
            text-align: center;
            border-radius: 30px;
            border: 2px solid #0093e9;
            background: #0f0a26;
            color: white;
            text-transform: uppercase;
        }

        .btn-action {
            background: #231942;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-action:hover { background: #3b2d6b; }

        .btn-success { background: #2ec4b6; color: white; }
        .btn-success:hover { background: #20a396; }

        .btn-danger { background: #e63946; color: white; }
        .btn-danger:hover { background: #ca1d2d; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 145, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 145, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 145, 0, 0); }
        }

        .team-inputs-container {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Reazione a Catena</h1>
        
        <div class="form-group">
            <label for="json-file">Carica File JSON della Catena:</label>
            <input type="file" id="json-file" accept=".json">
        </div>

        <div class="form-group">
            <label for="team-count">Numero di Squadre (X):</label>
            <input type="number" id="team-count" min="1" max="10" value="2" onchange="generateTeamInputs()">
        </div>

        <div id="team-names-container" class="team-inputs-container">
            </div>

        <button class="btn-primary" onclick="startGame()">INIZIA IL GIOCO</button>
    </div>

    <div id="game-screen">
        
        <div class="left-panel">
            <h3 style="margin-bottom: 15px; color: #ff9100;">SQUADRE IN GARA</h3>
            <div id="scoreboard"></div>
        </div>

        <div class="center-panel">
            <div class="chain-container" id="chain-wrapper">
                <div class="bubble bubble-anchor" id="node-top">ANCORE SOPRA</div>
                <div class="bubble bubble-target" id="node-mid">R_________</div>
                <div class="bubble bubble-anchor" id="node-bot">ANCORE SOTTO</div>
            </div>
            
            <div class="upcoming-list" id="upcoming-stack">
                </div>
        </div>

        <div class="right-panel">
            <div class="prize-capsule" id="current-prize">150.000</div>
            
            <div class="controls-box">
                <input type="text" id="player-guess" class="input-guess" placeholder="Scrivi la risposta..." autofocus>
                
                <button class="btn-success" onclick="checkAnswer()">Invia Risposta</button>
                <button class="btn-danger" onclick="halvePrize()">⚠️ Dimezza Montepremi</button>
                <button class="btn-action" onclick="revealExtraLetter()">Rivela Lettera Extra</button>
                <button class="btn-action" style="background-color: #581c87;" onclick="nextTurn()">Passa Turno Squadra</button>
                <button class="btn-action" style="margin-top: 20px; border-color: red;" onclick="forceReveal()">Mostra Soluzione</button>
            </div>
        </div>
    </div>

    <script>
        // Stato Globale dell'Applicazione
        let gameData = {
            titolo: "Catena Standard",
            premiIniziali: 150000,
            catena: ["PRODOTTO", "REGISTRO", "TEMPO", "BILANCIO", "ENTRATE", "NOTIZIA", "PELLE", "CONTROLLO", "CARATTERE"]
        };

        let teams = [];
        let currentTeamIndex = 0;
        let currentPrize = 150000;
        let currentAnchorIndex = 0; // Punta sempre all'ancora superiore attiva (indici pari: 0, 2, 4...)
        let lettersRevealedCount = 1;

        // Inizializzazione input nomi squadre
        function generateTeamInputs() {
            const count = parseInt(document.getElementById('team-count').value) || 2;
            const container = document.getElementById('team-names-container');
            container.innerHTML = '';
            for(let i = 1; i <= count; i++) {
                container.innerHTML += `
                    <div style="margin-bottom: 8px;">
                        <input type="text" id="team-name-${i}" value="Squadra ${i}" placeholder="Nome Squadra ${i}">
                    </div>
                `;
            }
        }
        generateTeamInputs();

        // Lettura file JSON
        document.getElementById('json-file').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    gameData = JSON.parse(event.target.result);
                    if(!gameData.catena || gameData.catena.length < 3) {
                        alert("Formato JSON non valido o parole insufficienti.");
                    }
                } catch(err) {
                    alert("Errore nella lettura del file JSON.");
                }
            };
            reader.readAsText(e.target.files[0]);
        });

        // Avvio Gioco
        function startGame() {
            const count = parseInt(document.getElementById('team-count').value) || 2;
            teams = [];
            for(let i = 1; i <= count; i++) {
                const name = document.getElementById(`team-name-${i}`).value || `Squadra ${i}`;
                teams.push({ name: name, score: 0 });
            }

            currentPrize = gameData.premiIniziali || 150000;
            currentAnchorIndex = 0;
            currentTeamIndex = 0;
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'grid';
            
            updateScoreboard();
            renderChainView();
        }

        // Renderizzazione Dinamica della Catena di Parole
        function renderChainView() {
            const arr = gameData.catena;
            
            // Assegnazione parole dei 3 blocchi principali
            const topWord = arr[currentAnchorIndex];
            const secretWord = arr[currentAnchorIndex + 1];
            const bottomWord = arr[currentAnchorIndex + 2];

            document.getElementById('node-top').innerText = topWord;
            document.getElementById('node-bot').innerText = bottomWord;

            // Costruisci il testo nascosto (Es: R_ _ _ _ _ _)
            let displayedSecret = secretWord.substring(0, lettersRevealedCount);
            for(let i = lettersRevealedCount; i < secretWord.length; i++) {
                displayedSecret += " _";
            }
            document.getElementById('node-mid').innerText = displayedSecret;

            // Aggiorna lo stack delle ancore successive in basso (Prendiamo gli indici pari successivi)
            const stackContainer = document.getElementById('upcoming-stack');
            stackContainer.innerHTML = '';
            
            for(let i = currentAnchorIndex + 4; i < arr.length; i += 2) {
                stackContainer.innerHTML += `<div class="upcoming-node">${arr[i]}</div>`;
            }

            document.getElementById('current-prize').innerText = currentPrize.toLocaleString('it-IT');
            document.getElementById('player-guess').value = '';
            document.getElementById('player-guess').focus();
        }

        // Controllo della Risposta Digitata
        function checkAnswer() {
            const inputField = document.getElementById('player-guess');
            const cleanGuess = inputField.value.trim().toUpperCase();
            const correctSolution = gameData.catena[currentAnchorIndex + 1].toUpperCase();

            if(cleanGuess === correctSolution) {
                triggerSuccessAnimation();
            } else {
                alert("Risposta Errata! Il portafoglio si dimezza.");
                halvePrize();
            }
        }

        // Animazione di Transizione e Avanzamento della Catena
        function triggerSuccessAnimation() {
            const wrapper = document.getElementById('chain-wrapper');
            const targetWord = gameData.catena[currentAnchorIndex + 1];
            
            // Rivela completamente la parola prima di scorrere
            document.getElementById('node-mid').innerText = targetWord;
            document.getElementById('node-mid').style.background = "#2ec4b6"; // Verde temporaneo di successo

            setTimeout(() => {
                // Avanzamento indici (salto di 2 unità: la parola indovinata diventa la nuova cima)
                currentAnchorIndex += 2;
                lettersRevealedCount = 1;

                // Controllo fine gioco
                if (currentAnchorIndex + 1 >= gameData.catena.length) {
                    teams[currentTeamIndex].score += currentPrize;
                    updateScoreboard();
                    alert(`🏆 Catena Completata! Spetta alla squadra ${teams[currentTeamIndex].name} incassare il montepremi di ${currentPrize.toLocaleString('it-IT')} €!`);
                    resetToSetup();
                } else {
                    // Ripristina colore arancione e aggiorna la vista
                    document.getElementById('node-mid').style.background = 'var(--orange-bubble)';
                    renderChainView();
                }
            }, 1200);
        }

        // Meccanica del "Dimezza"
        function halvePrize() {
            currentPrize = Math.ceil(currentPrize / 2);
            document.getElementById('current-prize').innerText = currentPrize.toLocaleString('it-IT');
        }

        // Rivela una lettera extra della parola nascosta
        function revealExtraLetter() {
            const secretWord = gameData.catena[currentAnchorIndex + 1];
            if(lettersRevealedCount < secretWord.length - 1) {
                lettersRevealedCount++;
                renderChainView();
            } else {
                alert("Rimane solo l'ultima lettera da indovinare!");
            }
        }

        // Forzatura / Rivela soluzione da Conduttore
        function forceReveal() {
            const correctSolution = gameData.catena[currentAnchorIndex + 1].toUpperCase();
            alert(`La parola misteriosa era: ${correctSolution}`);
            triggerSuccessAnimation();
        }

        // Gestione Turni Squadre
        function nextTurn() {
            currentTeamIndex = (currentTeamIndex + 1) % teams.length;
            updateScoreboard();
        }

        function updateScoreboard() {
            const holder = document.getElementById('scoreboard');
            holder.innerHTML = '';
            teams.forEach((t, idx) => {
                const isActive = (idx === currentTeamIndex) ? 'active-turn' : '';
                holder.innerHTML += `
                    <div class="team-score-card ${isActive}">
                        <span>${t.name}</span>
                        <strong>${t.score.toLocaleString('it-IT')} €</strong>
                    </div>
                `;
            });
        }

        function resetToSetup() {
            document.getElementById('setup-screen').style.display = 'block';
            document.getElementById('game-screen').style.display = 'none';
        }

        // Invio tramite tasto Enter
        document.getElementById('player-guess').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
