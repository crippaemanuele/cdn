<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reazione a Catena - Torneo Multimanche</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #670324, #120136, #03001e);
            --blue-bubble: linear-gradient(to bottom, #0093e9, #80d0c7);
            --blue-dark: #005585;
            --orange-bubble: linear-gradient(to bottom, #ff9100, #ff5500);
            --gray-node: #1f2438;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Rounded MT Bold', 'Segoe UI', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Schermata di Configurazione */
        #setup-screen {
            background: rgba(18, 1, 54, 0.9);
            border: 3px solid #ff9100;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: #fff;
            text-shadow: 0 0 10px #ff9100;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #0093e9;
        }

        input[type="number"], input[type="file"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #251b45;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .status-message {
            margin-top: 12px;
            font-size: 0.95rem;
            color: #2ec4b6;
            font-weight: bold;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 6px;
        }

        button {
            cursor: pointer;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--orange-bubble);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 85, 0, 0.4);
            width: 100%;
            margin-top: 15px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(255, 85, 0, 0.6);
        }

        /* Interfaccia di Gioco Principale */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 1300px;
            grid-template-columns: 1.2fr 1.6fr 1.2fr;
            gap: 25px;
        }

        /* Pannelli di Gioco */
        .left-panel, .right-panel {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .panel-title {
            font-size: 1.3rem;
            color: #ff9100;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 145, 0, 0.2);
            padding-bottom: 10px;
        }

        /* Gestione Scoreboard e Jolly */
        .team-score-card {
            background: #1a1436;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 6px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .team-score-card.active-turn {
            border-left: 6px solid #ff9100;
            background: #2b124c;
            animation: pulse 1.8s infinite;
        }

        .joker-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .joker-badge {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #ff9100;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid #fff;
            box-shadow: 0 0 8px rgba(255, 145, 0, 0.8);
            transition: all 0.3s ease;
        }

        .joker-badge.used {
            background: #333 !important;
            color: #666 !important;
            border: 1px solid #555 !important;
            box-shadow: none !important;
        }

        /* Centro: Display Catena */
        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #manche-indicator {
            font-size: 1.3rem;
            color: #00c6ff;
            margin-bottom: 15px;
            text-shadow: 0 0 8px rgba(0, 198, 255, 0.5);
            text-align: center;
            font-weight: bold;
        }

        .chain-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bubble {
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .bubble-anchor {
            background: linear-gradient(to right, #0072ff, #00c6ff);
            border: 2px solid #ffffff40;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        }

        .bubble-target {
            background: var(--orange-bubble);
            border: 2px solid #ffffff60;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        }

        .upcoming-list {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
            opacity: 0.85;
        }

        .upcoming-node {
            width: 100%;
            padding: 12px;
            background: rgba(31, 36, 56, 0.9);
            border: 1px solid #00c6ff;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            color: #00c6ff;
            font-weight: bold;
            letter-spacing: 1px;
            transform: scale(0.98);
        }

        /* Sezione Montepremi della squadra attiva */
        .prize-capsule {
            background: var(--orange-bubble);
            padding: 18px;
            border-radius: 40px;
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.6), 0 5px 15px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        /* Pannello di Controllo Risposte */
        .controls-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .input-guess {
            padding: 16px;
            font-size: 1.4rem;
            text-align: center;
            border-radius: 30px;
            border: 3px solid #0093e9;
            background: #0f0a26;
            color: white;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-guess:focus {
            box-shadow: 0 0 15px rgba(0, 147, 233, 0.6);
            border-color: #00c6ff;
        }

        .btn-action {
            background: #231942;
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .btn-action:hover { background: #3b2d6b; }

        .btn-success { background: #2ec4b6; color: white; }
        .btn-success:hover { background: #20a396; transform: scale(1.02); }

        .btn-joker {
            background: linear-gradient(135deg, #ff9100, #d4af37);
            color: white;
            border: 1px solid gold;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }
        .btn-joker:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.5);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 145, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 145, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 145, 0, 0); }
        }

        .team-inputs-container {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        .setup-team-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- SCHERMATA DI CONFIGURAZIONE INIZIALE -->
    <div id="setup-screen">
        <h1>Reazione a Catena</h1>
        
        <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);">
            <label for="json-file">Opzione 1: Carica File JSON locale</label>
            <input type="file" id="json-file" accept=".json">
            
            <div style="text-align: center; margin: 10px 0; font-weight: bold; color: #ff9100; font-size: 0.9rem;">— OPPURE —</div>
            
            <label for="json-url">Opzione 2: Carica da link GitHub / URL Web</label>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="json-url" placeholder="Incolla il link del file .json...">
                <button type="button" class="btn-action" style="border-radius: 8px; padding: 0 15px; font-size: 0.95rem;" onclick="loadJsonFromUrl()">Carica</button>
            </div>
            
            <div id="file-status" class="status-message">Nessun file o link caricato. Verrà usata la catena di default.</div>
        </div>

        <div class="form-group">
            <label for="team-count">Numero di Squadre:</label>
            <input type="number" id="team-count" min="1" max="10" value="2" onchange="generateTeamInputs()">
        </div>

        <h3 style="text-align: left; margin-bottom: 10px; color: #0093e9; font-size: 1.1rem;">Nomi Squadre e Montepremi Iniziali</h3>
        <div id="team-names-container" class="team-inputs-container">
            <!-- Generato dinamicamente via Javascript -->
        </div>

        <button class="btn-primary" onclick="startGame()">INIZIA IL TORNEO</button>
    </div>

    <!-- SCHERMATA DI GIOCO -->
    <div id="game-screen">
        
        <!-- PANNELLO SINISTRO: STATO DELLE SQUADRE IN GARA -->
        <div class="left-panel">
            <div class="panel-title">Squadre e Jolly</div>
            <div id="scoreboard"></div>
        </div>

        <!-- PANNELLO CENTRALE: GRAFICA ATTIVA DELLA CATENA -->
        <div class="center-panel">
            <div id="manche-indicator">Manche 1 / 1</div>
            <div class="chain-container" id="chain-wrapper">
                <div class="bubble bubble-anchor" id="node-top">PAROLA SOPRA</div>
                <div class="bubble bubble-target" id="node-mid">R_________</div>
                <div class="bubble bubble-anchor" id="node-bot">PAROLA SOTTO</div>
            </div>
            
            <div class="upcoming-list" id="upcoming-stack">
                <!-- Mostra l'anteprima delle ancore inferiori residue -->
            </div>
        </div>

        <!-- PANNELLO DESTRO: CONTROLLI CONDUTTORE / INTERAZIONE -->
        <div class="right-panel">
            <div class="panel-title">Squadra Attiva</div>
            <div class="prize-capsule" id="current-prize">150.000 €</div>
            
            <div class="controls-box">
                <input type="text" id="player-guess" class="input-guess" placeholder="SCRIVI LA RISPOSTA..." autofocus>
                
                <button class="btn-success" onclick="checkAnswer()">Invia Risposta</button>
                <button class="btn-joker" id="joker-btn" onclick="useJoker()">🌟 Usa Jolly (-1)</button>
                <button class="btn-action" style="background-color: #581c87;" onclick="nextTurn()">Passa Turno</button>
                <button class="btn-action" style="margin-top: 15px; border-color: #ff3333;" onclick="forceReveal()">Rivelazione Assistita</button>
            </div>
        </div>
    </div>

    <script>
        // Catena di fallback standard
        const defaultData = {
            catene_gioco: [{
                titolo: "Catena Standard",
                catena: ["PRODOTTO", "REGISTRO", "TEMPO", "BILANCIO", "ENTRATE", "NOTIZIA", "PELLE", "CONTROLLO", "CARATTERE"]
            }],
            premiIniziali: 150000
        };

        let loadedData = defaultData; 
        let activeChainList = [];     
        let currentChainIndex = 0;    
        let gameData = null;          

        let teams = [];
        let currentTeamIndex = 0;
        let currentAnchorIndex = 0; 
        let lettersRevealedCount = 1;

        // Genera i campi delle squadre
        function generateTeamInputs() {
            const count = parseInt(document.getElementById('team-count').value) || 2;
            const container = document.getElementById('team-names-container');
            const defaultPrize = loadedData.premiIniziali || 150000;
            
            container.innerHTML = '';
            for(let i = 1; i <= count; i++) {
                container.innerHTML += `
                    <div class="setup-team-row">
                        <input type="text" id="team-name-${i}" value="Squadra ${i}" placeholder="Nome Squadra ${i}" style="flex: 2;">
                        <input type="number" id="team-prize-${i}" value="${defaultPrize}" step="5000" placeholder="Montepremi (€)" style="flex: 1.2;">
                    </div>
                `;
            }
        }
        generateTeamInputs();

        // 1. Lettura da FileSystem locale
        document.getElementById('json-file').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    processJsonData(JSON.parse(event.target.result), "File locale");
                    document.getElementById('json-url').value = ''; // Resetta campo URL
                } catch(err) {
                    alert("Errore di sintassi nel file JSON. Controlla virgole e parentesi.");
                }
            };
            reader.readAsText(e.target.files[0]);
        });

        // 2. NUOVO: Lettura da Link Web / GitHub con gestione automatica del Raw URL
        function loadJsonFromUrl() {
            let url = document.getElementById('json-url').value.trim();
            if (!url) {
                alert("Inserisci un link prima di premere Carica!");
                return;
            }

            // Autocorrezione per i link standard di GitHub (da interfaccia web a file grezzo raw)
            if (url.includes('github.com') && url.includes('/blob/')) {
                url = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
            }

            const statusLabel = document.getElementById('file-status');
            statusLabel.innerText = "⏳ Download del file in corso...";
            statusLabel.style.color = "#ff9100";

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`Status di rete: ${response.status}`);
                    return response.json();
                })
                .then(parsed => {
                    processJsonData(parsed, "Link Web/GitHub");
                    document.getElementById('json-file').value = ''; // Resetta campo file locale
                })
                .catch(err => {
                    statusLabel.innerText = "❌ Errore nel caricamento del link.";
                    statusLabel.style.color = "#ff3333";
                    alert(`Impossibile scaricare il file JSON.\n\nDettagli: ${err.message}\n\nSuggerimento: Verifica che il link sia corretto, pubblico e che non violi le regole CORS.`);
                });
        }

        // Centralizza l'elaborazione e la validazione del JSON caricato
        function processJsonData(parsed, sorgente) {
            const statusLabel = document.getElementById('file-status');
            
            if (parsed.catene_gioco && Array.isArray(parsed.catene_gioco)) {
                loadedData = parsed;
                statusLabel.innerText = `✅ Caricato da ${sorgente}! Rilevate ${parsed.catene_gioco.length} catene.`;
                statusLabel.style.color = "#2ec4b6";
            } else if (parsed.catena && Array.isArray(parsed.catena)) {
                loadedData = { catene_gioco: [parsed], premiIniziali: parsed.premiIniziali || 150000 };
                statusLabel.innerText = `✅ Caricato da ${sorgente}! Rilevata 1 catena singola.`;
                statusLabel.style.color = "#2ec4b6";
            } else {
                alert("Formato file non valido. Assicurati che esista l'elenco 'catene_gioco' o 'catena'.");
                return;
            }
            generateTeamInputs();
        }

        // Avvio del Gioco
        function startGame() {
            activeChainList = loadedData.catene_gioco;
            currentChainIndex = 0;

            if(!activeChainList || activeChainList.length === 0) {
                alert("Nessuna catena disponibile per iniziare.");
                return;
            }

            const count = parseInt(document.getElementById('team-count').value) || 2;
            teams = [];
            for(let i = 1; i <= count; i++) {
                const name = document.getElementById(`team-name-${i}`).value || `Squadra ${i}`;
                const initialPrize = parseInt(document.getElementById(`team-prize-${i}`).value) || 150000;
                teams.push({
                    name: name,
                    prize: initialPrize,
                    jokers: 2
                });
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'grid';
            
            loadManche(currentChainIndex);
        }

        // Caricamento di una specifica Manche
        function loadManche(index) {
            gameData = activeChainList[index];
            currentAnchorIndex = 0;
            lettersRevealedCount = 1;
            
            teams.forEach(t => t.jokers = 2);

            updateScoreboard();
            renderChainView();
        }

        // Renderizzazione Grafica della Catena attiva
        function renderChainView() {
            document.getElementById('manche-indicator').innerText = `MANCHE ${currentChainIndex + 1} / ${activeChainList.length} • ${gameData.titolo || 'Senza Titolo'}`;

            const arr = gameData.catena;
            const topWord = arr[currentAnchorIndex];
            const secretWord = arr[currentAnchorIndex + 1];
            const bottomWord = arr[currentAnchorIndex + 2];

            document.getElementById('node-top').innerText = topWord;
            document.getElementById('node-bot').innerText = bottomWord;

            let displayedSecret = secretWord.substring(0, lettersRevealedCount);
            for(let i = lettersRevealedCount; i < secretWord.length; i++) {
                displayedSecret += " _";
            }
            document.getElementById('node-mid').innerText = displayedSecret;

            const stackContainer = document.getElementById('upcoming-stack');
            stackContainer.innerHTML = '';
            for(let i = currentAnchorIndex + 4; i < arr.length; i += 2) {
                stackContainer.innerHTML += `<div class="upcoming-node">${arr[i]}</div>`;
            }

            const activeTeam = teams[currentTeamIndex];
            const jokerBtn = document.getElementById('joker-btn');
            jokerBtn.innerText = `🌟 Usa Jolly (${activeTeam.jokers})`;
            if (activeTeam.jokers <= 0) {
                jokerBtn.style.opacity = '0.5';
                jokerBtn.style.cursor = 'not-allowed';
            } else {
                jokerBtn.style.opacity = '1';
                jokerBtn.style.cursor = 'pointer';
            }

            document.getElementById('player-guess').value = '';
            document.getElementById('player-guess').focus();
        }

        // Controllo Risposte delle Squadre
        function checkAnswer() {
            const inputField = document.getElementById('player-guess');
            const cleanGuess = inputField.value.trim().toUpperCase();
            const correctSolution = gameData.catena[currentAnchorIndex + 1].toUpperCase();

            if (cleanGuess === '') return;

            if (cleanGuess === correctSolution) {
                triggerSuccessAnimation();
            } else {
                const activeTeam = teams[currentTeamIndex];
                activeTeam.prize = Math.ceil(activeTeam.prize / 2);
                
                alert(`SBAGLIATO!\nIl montepremi di "${activeTeam.name}" viene dimezzato!\nSi aggiunge una lettera e il turno passa alla squadra successiva.`);

                const secretLength = gameData.catena[currentAnchorIndex + 1].length;
                if (lettersRevealedCount < secretLength) {
                    lettersRevealedCount++;
                }

                if (lettersRevealedCount >= secretLength) {
                    alert(`La parola misteriosa era "${correctSolution}". Viene svelata e la catena avanza.`);
                    handleChainProgression();
                } else {
                    nextTurn();
                    renderChainView();
                }
            }
        }

        // Gestione dell'uso del Jolly
        function useJoker() {
            const activeTeam = teams[currentTeamIndex];
            const secretWord = gameData.catena[currentAnchorIndex + 1];

            if (activeTeam.jokers <= 0) {
                alert("Nessun Jolly rimasto per questa manche!");
                return;
            }

            if (lettersRevealedCount >= secretWord.length - 1) {
                alert("Rimane una sola lettera! Non puoi sprecare un Jolly adesso.");
                return;
            }

            activeTeam.jokers--;
            lettersRevealedCount++;
            
            updateScoreboard();
            renderChainView();
            alert(`Jolly speso! Rivelata una lettera in più. Tocca ancora a "${activeTeam.name}".`);
        }

        function triggerSuccessAnimation() {
            const targetWord = gameData.catena[currentAnchorIndex + 1];
            const activeTeamName = teams[currentTeamIndex].name;
            
            document.getElementById('node-mid').innerText = targetWord;
            document.getElementById('node-mid').style.background = "#2ec4b6"; 

            setTimeout(() => {
                document.getElementById('node-mid').style.background = 'var(--orange-bubble)';
                alert(`Esatto! "${activeTeamName}" ha trovato la parola.`);
                handleChainProgression();
            }, 1300);
        }

        function handleChainProgression() {
            currentAnchorIndex += 2;
            lettersRevealedCount = 1;

            if (currentAnchorIndex + 1 >= gameData.catena.length) {
                checkNextManche();
            } else {
                nextTurn();
                renderChainView();
            }
        }

        function checkNextManche() {
            currentChainIndex++;
            
            if (currentChainIndex < activeChainList.length) {
                alert(`🎉 MANCHE COMPLETATA!\n\nPreparatevi... si passa alla prossima catena: \n"${activeChainList[currentChainIndex].titolo}"!\n\nI Jolly di tutte le squadre sono stati ricaricati a 2.`);
                nextTurn(); 
                loadManche(currentChainIndex);
            } else {
                endGame(); 
            }
        }

        function nextTurn() {
            currentTeamIndex = (currentTeamIndex + 1) % teams.length;
            updateScoreboard();
        }

        function forceReveal() {
            const correctSolution = gameData.catena[currentAnchorIndex + 1].toUpperCase();
            if (confirm(`Vuoi rivelare forzatamente la parola "${correctSolution}"?`)) {
                handleChainProgression();
            }
        }

        function updateScoreboard() {
            const holder = document.getElementById('scoreboard');
            holder.innerHTML = '';
            
            teams.forEach((t, idx) => {
                const isActive = (idx === currentTeamIndex) ? 'active-turn' : '';
                let jokersHTML = '';
                for (let j = 0; j < 2; j++) {
                    jokersHTML += `<span class="joker-badge ${j >= t.jokers ? 'used' : ''}">J</span>`;
                }

                holder.innerHTML += `
                    <div class="team-score-card ${isActive}">
                        <div>
                            <span style="font-size: 1.15rem; font-weight: bold; display: block; color: #fff;">${t.name}</span>
                            <div class="joker-container">${jokersHTML}</div>
                        </div>
                        <strong style="font-size: 1.4rem; color: #ff9100; text-shadow: 1px 1px 2px #000;">
                            ${t.prize.toLocaleString('it-IT')} €
                        </strong>
                    </div>
                `;
            });
            
            if (teams[currentTeamIndex]) {
                document.getElementById('current-prize').innerText = teams[currentTeamIndex].prize.toLocaleString('it-IT') + " €";
            }
        }

        function endGame() {
            let winner = teams[0];
            let draw = false;
            
            for (let i = 1; i < teams.length; i++) {
                if (teams[i].prize > winner.prize) {
                    winner = teams[i];
                    draw = false;
                } else if (teams[i].prize === winner.prize) {
                    draw = true;
                }
            }

            let recap = "🏆 IL TORNEO È TERMINATO! 🏆\n\nClassifica Finale Generale:\n";
            teams.forEach(t => {
                recap += `- ${t.name}: ${t.prize.toLocaleString('it-IT')} €\n`;
            });

            if (draw) {
                recap += "\nIncredibile! C'è un pareggio perfetto al primo posto!";
            } else {
                recap += `\n👑 VINCE IL TORNEO ASSOLUTO: ${winner.name}!!!`;
            }

            alert(recap);
            resetToSetup();
        }

        function resetToSetup() {
            document.getElementById('setup-screen').style.display = 'block';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('file-status').innerText = "Nessun file o link caricato. Verrà usata la catena di default.";
            document.getElementById('file-status').style.color = "#2ec4b6";
            loadedData = defaultData;
            generateTeamInputs();
        }

        document.getElementById('player-guess').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
