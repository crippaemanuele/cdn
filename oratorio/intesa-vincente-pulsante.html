<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulsante - L'Intesa Vincente</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; background-color: #222; color: white;
            font-family: Arial, sans-serif;
        }
        #setup { display: flex; flex-direction: column; gap: 15px; width: 80%; }
        input { padding: 15px; font-size: 18px; text-align: center; border-radius: 8px; border: none; }
        button.connect-btn { padding: 15px; font-size: 18px; background: #0066cc; color: white; border: none; border-radius: 8px; }
        
        #button-area { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; }
        .big-button {
            width: 80vw; height: 80vw; max-width: 400px; max-height: 400px;
            background: radial-gradient(circle, #ff3333, #aa0000);
            border-radius: 50%; border: 10px solid #550000;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 15px 15px rgba(255,255,255,0.3);
            color: white; font-size: 50px; font-weight: bold; cursor: pointer;
            display: flex; justify-content: center; align-items: center; text-transform: uppercase;
        }
        .big-button:active {
            transform: scale(0.95); box-shadow: 0 10px 15px rgba(0,0,0,0.7), inset 0 25px 25px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <div id="setup">
        <h2>Connetti al Tabellone</h2>
        <input type="text" id="host-id" placeholder="Inserisci Codice Tabellone">
        <button class="connect-btn" onclick="connectToHost()">Connetti</button>
        <p id="status"></p>
    </div>

    <div id="button-area">
        <div class="big-button" onclick="sendStop()">STOP</div>
    </div>

    <script>
        let peer = new Peer();
        let conn;

        function connectToHost() {
            const hostId = document.getElementById('host-id').value.trim();
            if(!hostId) return;
            
            document.getElementById('status').innerText = "Connessione in corso...";
            conn = peer.connect(hostId);
            
            conn.on('open', function() {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('button-area').style.display = 'flex';
                // Mantiene lo schermo attivo (funziona sui browser mobili moderni)
                if (navigator.wakeLock) navigator.wakeLock.request('screen');
            });

            conn.on('error', function(err) {
                document.getElementById('status').innerText = "Errore: " + err;
            });
        }

        function sendStop() {
            if(conn && conn.open) {
                conn.send({ action: 'STOP' });
                // Feedback visivo/tattile sul telefono
                if(navigator.vibrate) navigator.vibrate(200); 
            }
        }
    </script>
</body>
</html>
