<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulsante - L'Intesa Vincente</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; background-color: #111; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden;
        }
        #setup { 
            display: flex; flex-direction: column; gap: 15px; width: 85%; max-width: 400px;
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; text-align: center;
        }
        h2 { margin-top: 0; color: #ffcc00; }
        input { padding: 15px; font-size: 20px; text-align: center; border-radius: 8px; border: none; font-weight: bold; }
        button.connect-btn { 
            padding: 15px; font-size: 18px; font-weight: bold; background: #0066cc; 
            color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        button.connect-btn:active { background: #004499; transform: scale(0.98); }
        
        #status { font-size: 14px; color: #aaa; margin-top: 10px; }

        #button-area { display: none; width: 100%; height: 100%; justify-content: center; align-items: center; }
        
        .big-button {
            width: 80vw; height: 80vw; max-width: 400px; max-height: 400px;
            background: radial-gradient(circle, #ff4444, #aa0000);
            border-radius: 50%; border: 12px solid #550000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 20px 20px rgba(255,255,255,0.2);
            color: white; font-size: 60px; font-weight: 900; cursor: pointer;
            display: flex; justify-content: center; align-items: center; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.1s;
        }
        .big-button:active {
            transform: scale(0.92); 
            box-shadow: 0 10px 15px rgba(0,0,0,0.8), inset 0 30px 30px rgba(0,0,0,0.6);
            background: radial-gradient(circle, #cc0000, #880000);
        }
    </style>
</head>
<body>

    <div id="setup">
        <h2>Connetti Dispositivo</h2>
        <p style="font-size: 14px; color: #ccc; margin-top:0;">Inserisci il PIN mostrato sul tabellone.</p>
        <input type="text" id="host-id" placeholder="Es: 1a2b3c4d...">
        <button class="connect-btn" onclick="connectToHost()">CONNETTI</button>
        <p id="status"></p>
    </div>

    <div id="button-area">
        <div class="big-button" onclick="sendStop()">STOP</div>
    </div>

    <script>
        let peer = new Peer();
        let conn;

        // Al caricamento, controlla se c'è un ID nell'URL (es: se inquadrato da QR Code)
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const hostIdFromUrl = urlParams.get('id');
            
            if (hostIdFromUrl) {
                document.getElementById('host-id').value = hostIdFromUrl;
                document.getElementById('status').innerText = "Rilevato QR Code! Connessione in corso...";
                connectToHost(); // Connessione automatica
            }
        };

        function connectToHost() {
            const hostId = document.getElementById('host-id').value.trim();
            if(!hostId) return;
            
            document.getElementById('status').innerText = "Connessione in corso...";
            conn = peer.connect(hostId);
            
            conn.on('open', function() {
                // Nascondi setup e mostra il pulsante
                document.getElementById('setup').style.display = 'none';
                document.getElementById('button-area').style.display = 'flex';
                
                // Mantiene lo schermo attivo (WakeLock API)
                if ('wakeLock' in navigator) {
                    navigator.wakeLock.request('screen').catch((err) => {
                        console.log("WakeLock non supportato dal dispositivo:", err);
                    });
                }
            });

            conn.on('error', function(err) {
                document.getElementById('status').innerText = "Errore di connessione: riprova.";
                console.error(err);
            });
        }

        function sendStop() {
            if(conn && conn.open) {
                conn.send({ action: 'STOP' });
                // Feedback tattile (vibrazione) su dispositivi mobili supportati
                if(navigator.vibrate) navigator.vibrate([150]); 
            }
        }
    </script>
</body>
</html>
